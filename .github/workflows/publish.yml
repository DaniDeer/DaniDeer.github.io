name: Publish to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history for git-dates plugin

      - name: Build docs (Zensical container)
        # Official Zensical Docker image — no Python install needed.
        # Mounts the repo root as /docs; writes output to site/.
        # See: https://hub.docker.com/r/zensical/zensical
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/docs \
            zensical/zensical \
            build --clean

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
